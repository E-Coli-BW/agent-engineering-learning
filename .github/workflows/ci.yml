name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ===== Python 测试 =====
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio httpx
          pip install langchain langchain-ollama langchain-community chromadb
          pip install langchain-text-splitters
          pip install fastapi uvicorn python-multipart
          pip install pydantic
          pip install pymupdf python-pptx python-docx

      - name: Run tests
        run: |
          PYTHONPATH=. python -m pytest tests/ -v --tb=short

  # ===== Java Gateway 测试 =====
  java-test:
    name: Java Gateway Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('gateway/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build & Test Gateway
        working-directory: gateway
        run: mvn clean verify -B

  # ===== Gateway Build =====
  java-build:
    name: Java Gateway Build
    runs-on: ubuntu-latest
    needs: java-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('gateway/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Package Gateway JAR
        working-directory: gateway
        run: mvn clean package -DskipTests -B

      - name: Upload Gateway JAR
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: gateway/target/gateway-*.jar
          retention-days: 7
