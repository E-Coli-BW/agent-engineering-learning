# ============================================================
# Agent Learning API Gateway — 本地开发配置 (默认)
# ============================================================
# 本地开发: 直接 mvn spring-boot:run 或 java -jar，全部走 localhost
# Docker:   SPRING_PROFILES_ACTIVE=docker 激活 application-docker.yml
# Nacos:    SPRING_PROFILES_ACTIVE=nacos  激活 application-nacos.yml
# ============================================================

server:
  port: 8080

spring:
  application:
    name: agent-gateway
  main:
    web-application-type: reactive

  cloud:
    nacos:
      discovery:
        enabled: false

    sentinel:
      enabled: true
      transport:
        dashboard: localhost:8858
        port: 8719
      filter:
        enabled: false

    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, agent-learning
        - DedupeResponseHeader=Access-Control-Allow-Origin

      routes:
        - id: rag-api
          uri: http://localhost:8000
          predicates:
            - Path=/api/rag/**
          filters:
            - StripPrefix=2

        - id: a2a-agent
          uri: http://localhost:5001
          predicates:
            - Path=/api/a2a/**
          filters:
            - StripPrefix=2

        - id: react-agent
          uri: http://localhost:5002
          predicates:
            - Path=/api/react/**
          filters:
            - StripPrefix=2

        - id: frontend
          uri: http://localhost:3000
          predicates:
            - Path=/**
          order: 9999

# ---- 下游服务地址 (聚合健康检查用) ----
downstream:
  rag-url: http://localhost:8000
  a2a-url: http://localhost:5001
  react-url: http://localhost:5002

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# ---- JWT ----
gateway:
  auth:
    enabled: false
    secret: change-me-in-production-at-least-32-chars!!
    expiration-hours: 24
    public-paths:
      - /api/rag/health
      - /api/a2a/.well-known/agent.json
      - /api/react/.well-known/agent.json
      - /api/a2a/health
      - /api/react/health
      - /auth/**
      - /fallback/**
      - /actuator/**
      - /health/**

# ---- 日志 ----
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.alibaba.cloud.sentinel: INFO
    com.agentlearning.gateway: DEBUG
