# Prometheus 配置 — Docker 网络内通过 service name 访问
global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway:8080']
        labels:
          service: 'gateway'

  - job_name: 'rag-api'
    metrics_path: '/metrics'
    params:
      format: ['text/plain']
    static_configs:
      - targets: ['rag-api:8000']
        labels:
          service: 'rag-api'
