# Prometheus 采集配置
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # ---- Java Gateway (Micrometer + Prometheus) ----
  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'gateway'
          language: 'java'

  # ---- Python RAG API ----
  - job_name: 'rag-api'
    metrics_path: '/metrics'
    params:
      format: ['text/plain']
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'rag-api'
          language: 'python'
